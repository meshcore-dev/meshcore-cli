name: Build Fedora RPM Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            python3-devel \
            python3-pip \
            git \
            help2man

      - name: Build RPM package
        run: |
          # Create rpmbuild directory structure
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          
          # Copy spec file to SPECS directory
          cp "$GITHUB_WORKSPACE/meshcore-cli.spec" ~/rpmbuild/SPECS/
          
          # Create source tarball
          git -C "$GITHUB_WORKSPACE" archive --prefix=meshcore-cli-${GITHUB_REF#refs/tags/v}/ --format=tar.gz \
            -o ~/rpmbuild/SOURCES/meshcore-cli-${GITHUB_REF#refs/tags/v}.tar.gz HEAD
          
          # Build RPM
          rpmbuild -bb ~/rpmbuild/SPECS/meshcore-cli.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: ~/rpmbuild/RPMS/noarch/*.rpm
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ~/rpmbuild/RPMS/noarch/*.rpm
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
