name: Build Fedora RPM Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          dnf install -y \
            rpm-build \
            python3-devel \
            python3-installer \
            python3-pip \
            pyproject-rpm-macros \
            python3-hatchling \
            help2man \
            tar \
            gzip

      - name: Build RPM package
        working-directory: ${{ github.workspace }}
        run: |
          # Create rpmbuild directory structure
          mkdir -p ~/rpmbuild/BUILD ~/rpmbuild/RPMS ~/rpmbuild/SOURCES ~/rpmbuild/SPECS ~/rpmbuild/SRPMS

          # Build RPM packages for Python dependencies missing from Fedora releases
          packaging/build-python-dependency-rpms.sh
          
          # Ensure the RPM spec file is included in the checkout
          test -f meshcore-cli.spec || { echo "meshcore-cli.spec is missing from the checkout"; exit 1; }

          # Copy spec file to SPECS directory
          cp meshcore-cli.spec ~/rpmbuild/SPECS/

          # Read the package version from the RPM spec
          VERSION="$(awk '/^Version:/ { print $2; exit }' meshcore-cli.spec)"
          test -n "$VERSION" || { echo "Could not determine RPM version from meshcore-cli.spec"; exit 1; }
          
          # Create source tarball from the checked out workspace
          SOURCE_DIR="$(mktemp -d)"
          mkdir -p "$SOURCE_DIR/meshcore-cli-$VERSION"
          tar --exclude-vcs --exclude='./dist' --exclude='./build' --exclude='./*.egg-info' \
            -cf - . | tar -C "$SOURCE_DIR/meshcore-cli-$VERSION" -xf -
          tar -C "$SOURCE_DIR" -czf ~/rpmbuild/SOURCES/meshcore-cli-$VERSION.tar.gz "meshcore-cli-$VERSION"
          rm -rf "$SOURCE_DIR"
          
          # Build RPM
          rpmbuild -bb ~/rpmbuild/SPECS/meshcore-cli.spec

          # Collect all RPM packages, including dependency packages
          mkdir -p dist/rpm
          find ~/rpmbuild/RPMS -type f -name '*.rpm' -exec cp {} dist/rpm/ \;
          ls -l dist/rpm/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rpm-package
          path: dist/rpm/*.rpm
          if-no-files-found: error
          retention-days: 30

      - name: Upload RPM packages to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/rpm/*.rpm
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
