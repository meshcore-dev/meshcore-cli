name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Add Docker image to Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "" || \
              gh release view "$TAG_NAME" >/dev/null
          fi

          gh release view "$TAG_NAME" --json body --jq '.body // ""' > release-body.md
          awk '
            /<!-- docker-image:start -->/ { skip = 1; next }
            /<!-- docker-image:end -->/ { skip = 0; next }
            !skip { print }
          ' release-body.md > release-body-updated.md

          cat >> release-body-updated.md <<EOF

          <!-- docker-image:start -->
          ## Docker image

          \`\`\`bash
          docker pull $IMAGE:$TAG_NAME
          \`\`\`

          Image digest: \`$IMAGE_DIGEST\`
          <!-- docker-image:end -->
          EOF

          gh release edit "$TAG_NAME" --notes-file release-body-updated.md
